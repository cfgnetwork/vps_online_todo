
#nano /etc/sysctl.d/90-vps-optimize-jacob.conf
##贴入以下内容：
#
#
# ===============================================================
# VPS 开局综合优化配置 (Debian 12/13)
# 安全 / 并发 / 高性能 / NAT 网关场景
# 硬件档位: 1GB~2GB 内存, 1~2 Core, 千兆网卡, HDD/SSD
# 说明: BBR 在独立配置文件中处理, 本文件不含拥塞控制项
# ===============================================================

# ==================== 1. IPv6 关闭 ====================
net.ipv6.conf.all.disable_ipv6 = 1
net.ipv6.conf.default.disable_ipv6 = 1
net.ipv6.conf.lo.disable_ipv6 = 1

# ==================== 2. ICMP / Ping 防护 ====================
# 完全禁止 Ping 响应
net.ipv4.icmp_echo_ignore_all = 1
# 禁止响应 ICMP 广播(防 Smurf 攻击)
net.ipv4.icmp_echo_ignore_broadcasts = 1
# 忽略伪造的 ICMP 错误响应(防恶意干扰连接)
net.ipv4.icmp_ignore_bogus_error_responses = 1

# ==================== 3. 反欺骗 / 路由安全 ====================
# 反向路径过滤(防 IP 欺骗) —— 网关前线尤其重要
net.ipv4.conf.all.rp_filter = 1
net.ipv4.conf.default.rp_filter = 1

# 禁用源路由(防绕过安全网关) - IPv4 + IPv6
net.ipv4.conf.all.accept_source_route = 0
net.ipv4.conf.default.accept_source_route = 0
net.ipv6.conf.all.accept_source_route = 0

# 禁止接收 ICMP 重定向(防中间人攻击)
net.ipv4.conf.all.accept_redirects = 0
net.ipv4.conf.default.accept_redirects = 0
# 禁止发送 ICMP 重定向(本机不作终端路由器时必开)
net.ipv4.conf.all.send_redirects = 0

# 记录 Martian 数据包(源地址伪造/非法包日志)
net.ipv4.conf.all.log_martians = 1

# ==================== 4. SYN Flood / DDoS 防御 ====================
# 开启 SYN Cookie
net.ipv4.tcp_syncookies = 1
# 半连接队列长度
net.ipv4.tcp_max_syn_backlog = 8192
# 减少握手重试次数, 快速释放虚假连接
net.ipv4.tcp_synack_retries = 3
net.ipv4.tcp_syn_retries = 4

# ==================== 5. 内核加固 ====================
# 地址空间布局随机化 (ASLR) - 最高等级
kernel.randomize_va_space = 2
# 内核 oops 后直接 panic, 避免错误内核态继续跑引发脏状态
kernel.panic_on_oops = 1

# ==================== 6. 文件描述符上限 ====================
# 系统全局文件最大值(需大于等于用户级 hard 限制 1048576)
fs.file-max = 2097152

# ==================== 7. TCP 延迟优化 (BBR 在独立文件) ====================
# BBR 默认队列算法: fq 队列方案
#net.core.default_qdisc = fq
# 开启 BBR 拥塞控制算法
#net.ipv4.tcp_congestion_control = bbr

# 空闲后不重回慢启动
net.ipv4.tcp_slow_start_after_idle = 0
# 未发送数据低水位(减少小包延迟)
net.ipv4.tcp_notsent_lowat = 131072

# ==================== 8. 网络缓冲 & 吞吐量 (美西高延迟默认档) ====================
# 接口接收队列(千兆小包 pps 提升)
net.core.netdev_max_backlog = 16384

# 通告窗口分配: 1=默认(50%/50%), 2=75%/25%(占用内存更少)
net.ipv4.tcp_adv_win_scale = 1

# 方案A:
# 读写缓冲区最大值 (64MB) - 美西高延迟 ~180ms 默认档
# 千兆 + 180ms RTT 的 BDP ≈ 22.5MB, 窗口需 ≥ ~34MB 才能跑满, 64MB 留足余量
# NAT 网关双向连接双份占用, 1GB 内存机器并发多时观察 free -m
net.core.rmem_max = 67108864
net.core.wmem_max = 67108864

# 接收缓冲区(rmem) [最小 4KB | 默认 87380 适应高速网络 | 最大 64MB]
# 发送缓冲区(wmem) [最小 4KB | 默认 64KB | 最大 64MB]
net.ipv4.tcp_rmem = 4096 87380 67108864
net.ipv4.tcp_wmem = 4096 65536 67108864

# 方案B:
# ---- 低延迟区域档 (香港 <50ms / 新加坡 ~80ms) 默认关闭, 按需开启 ----
# 低 RTT 下 BDP 仅 6~10MB, 32MB 已富余, 内存紧张或低延迟区域去掉下面注释启用
# net.core.rmem_max = 33554432
# net.core.wmem_max = 33554432

# 接收缓冲区(rmem) [最小 4KB | 默认 87380 适应高速网络 | 最大 32MB]
# 发送缓冲区(wmem) [最小 4KB | 默认 64KB | 最大 32MB]
# net.ipv4.tcp_rmem = 4096 87380 33554432
# net.ipv4.tcp_wmem = 4096 65536 33554432

# ==================== 9. 高并发 & 连接回收 ====================
# 本地端口范围(网关 NAT 出向连接池, 从 16K 扩到 64K)
net.ipv4.ip_local_port_range = 4930 65535
# 允许复用 TIME-WAIT 连接(网关出向高并发价值更高)
net.ipv4.tcp_tw_reuse = 1
# FIN-WAIT-2 超时(快速释放不活动连接)
net.ipv4.tcp_fin_timeout = 30
# 全连接队列上限
net.core.somaxconn = 65535

# TCP Keepalive 心跳(网关场景收紧, 快速识别死连接释放 NAT 表项)
net.ipv4.tcp_keepalive_time = 120
net.ipv4.tcp_keepalive_intvl = 15
net.ipv4.tcp_keepalive_probes = 3

# TCP Fast Open(握手即传数据, 减少 HTTPS 延迟)
net.ipv4.tcp_fastopen = 1

# ==================== 10. 连接跟踪 (nf_conntrack) - NAT 网关必需 ====================
# 默认按 1GB 档: 表项 262144, 桶 65536 (~64MB 占用)
net.netfilter.nf_conntrack_max = 262144
net.netfilter.nf_conntrack_buckets = 65536
# 已建立连接超时(网关场景 30 分钟, 加速空闲表项回收)
net.netfilter.nf_conntrack_tcp_timeout_established = 1800
# NAT 下某些客户端 RST 不标准, 开启避免误删有效表项导致连接中断
net.netfilter.nf_conntrack_tcp_be_liberal = 1

# ---- 2GB 档按需打开(去掉下面注释) ----
# 2GB 内存机器可上探表项, 实测 conntrack -C 峰值后再决定
# net.netfilter.nf_conntrack_max = 524288
# net.netfilter.nf_conntrack_buckets = 131072

# ==================== 11. IP 转发 (NAT 网关必需) ====================
net.ipv4.ip_forward = 1

# ==================== 12. 可选配置 ====================
# TCP MTU 探测(路径 MTU 黑洞时启用)
net.ipv4.tcp_mtu_probing = 1

# ==================== 13. 内存与内核 ====================
# swap 倾向: 1GB 档建议 30(宁可慢 swap 也不 OOM kill); 2GB 档可改 10
vm.swappiness = 30
# 内核恐慌后自动重启(避免机房硬重启等待, 单位: 秒)
kernel.panic = 10

# ---- HDD 机器按需打开(SSD 跳过, 避免脏页峰堵塞读) ----
# vm.dirty_background_ratio = 5
# vm.dirty_ratio = 10
# vm.dirty_expire_centisecs = 3000

# ===============================================================
# 缓冲延迟分档说明 (第 8 段):
#   美西高延迟 (~180ms) : 默认生效 64MB (已开启, 无需操作)
#   香港 (<50ms) / 新加坡 (~80ms): 默认 64MB, 若内存紧张可启用第 8 段末尾
#                           注释的 32MB 低延迟档 (去掉 4 行 # 注释即可)
#   校验: sysctl net.core.rmem_max  (应返回 67108864 或 33554432)
# ===============================================================

# ===============================================================
# 使用方式:
# nano /etc/sysctl.d/90-vps-optimize-jacob.conf
# sysctl -p /etc/sysctl.d/90-vps-optimize-jacob.conf
# 依次加载: /etc/sysctl.d/*.conf → /etc/sysctl.conf
# sysctl --system
#
# 配套(本文件不含, 需另行配置):
#   /etc/modules-load.d/nf_conntrack.conf  ->  nf_conntrack
#   /etc/security/limits.d/90-nofile.conf  ->  nofile 65535/1048576
#   /etc/systemd/system.conf               ->  DefaultLimitNOFILE=1048576 / DefaultLimitNPROC=65535
#                                             (改完 systemctl daemon-reexec)
#   /etc/systemd/journald.conf             ->  SystemMaxUse=500M / SystemKeepFree=1G / MaxFileSec=7day
# ===============================================================


